<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 用法开发日志</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid #334155;
      position: relative;
    }
    header h1 { margin: 0; font-size: 24px; }
    .auth-bar {
      position: absolute;
      right: 16px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .auth-bar span { color: var(--muted); }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    label { display: block; margin: 10px 0 4px; color: var(--muted); font-size: 14px; }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: var(--text);
      font-size: 14px;
    }
    textarea { min-height: 100px; resize: vertical; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 140px; }
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
    }
    button.small { padding: 6px 12px; font-size: 13px; }
    button.secondary { background: #334155; color: var(--text); }
    button.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .toolbar input, .toolbar select { flex: 1; }
    .log-item h3 { margin: 0 0 4px; }
    .meta { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .tag {
      display: inline-block;
      background: #334155;
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-right: 6px;
    }
    .content { white-space: pre-wrap; }
    .log-img { max-width: 100%; border-radius: 8px; margin-top: 12px; display: block; }
    .preview-img { max-width: 200px; border-radius: 8px; margin-top: 8px; display: block; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    .empty { text-align: center; color: var(--muted); padding: 40px 0; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .status { text-align: center; color: var(--muted); padding: 20px 0; }
    .hidden { display: none !important; }
    .login-box { max-width: 360px; margin: 0 auto; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 AI 用法开发日志</h1>
    <div class="auth-bar">
      <span id="userInfo"></span>
      <button class="small secondary" id="loginBtn" onclick="showLogin()">登录</button>
      <button class="small secondary hidden" id="logoutBtn" onclick="logout()">退出</button>
    </div>
  </header>

  <div class="container">
    <div class="card login-box hidden" id="loginCard">
      <h2>登录以编辑</h2>
      <label>邮箱</label>
      <input id="email" type="email" placeholder="你的邮箱" />
      <label>密码</label>
      <input id="password" type="password" placeholder="你的密码" />
      <div class="btn-group">
        <button onclick="login()">登录</button>
        <button class="secondary" onclick="hideLogin()">取消</button>
      </div>
    </div>

    <div class="card hidden" id="editorCard">
      <h2 id="formTitle">新增日志</h2>
      <input type="hidden" id="editId" />
      <input type="hidden" id="editImageUrl" />
      <label>标题</label>
      <input id="title" placeholder="例如：用 RAG 优化客服问答" />
      <div class="row">
        <div>
          <label>日期</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label>标签（用逗号分隔）</label>
          <input id="tags" placeholder="Prompt, Agent, RAG" />
        </div>
      </div>
      <label>内容</label>
      <textarea id="content" placeholder="记录你的思路、Prompt、遇到的问题和结论..."></textarea>
      <label>图片（可选）</label>
      <input id="imageFile" type="file" accept="image/*" onchange="previewImage()" />
      <div id="previewArea"></div>
      <div class="btn-group">
        <button id="saveBtn" onclick="saveLog()">保存</button>
        <button class="secondary" onclick="resetForm()">清空</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="search" placeholder="🔍 搜索标题或内容..." oninput="render()" />
      <select id="filterTag" onchange="render()">
        <option value="">全部标签</option>
      </select>
    </div>

    <div id="list"></div>
    <div id="status" class="status">正在连接云端…</div>
  </div>

  <script>
    // ====== 只需改这两行：填入你的两把钥匙 ======
    const SUPABASE_URL = "https://qmzfibxynswzxpepdkru.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtemZpYnh5bnN3enhwZXBka3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTg2MDIsImV4cCI6MjA5ODU3NDYwMn0.qdc1KLIg6azeogR_6Z2Xe-ATPp_wvpj1_0QDULL1uT4";
    // ==========================================

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let cache = [];
    let isLoggedIn = false;

    // ---------- 登录相关 ----------
    function showLogin() { document.getElementById("loginCard").classList.remove("hidden"); }
    function hideLogin() { document.getElementById("loginCard").classList.add("hidden"); }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) { alert("登录失败：" + error.message); return; }
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      hideLogin();
      await checkAuth();
    }

    async function logout() {
      await db.auth.signOut();
      await checkAuth();
    }

    async function checkAuth() {
      const { data } = await db.auth.getSession();
      isLoggedIn = !!(data && data.session);
      const editorCard = document.getElementById("editorCard");
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const userInfo = document.getElementById("userInfo");
      if (isLoggedIn) {
        editorCard.classList.remove("hidden");
        loginBtn.classList.add("hidden");
        logoutBtn.classList.remove("hidden");
        userInfo.textContent = "已登录";
      } else {
        editorCard.classList.add("hidden");
        loginBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        userInfo.textContent = "";
      }
      render();
    }

    // ---------- 图片预览 ----------
    function previewImage() {
      const file = document.getElementById("imageFile").files[0];
      const area = document.getElementById("previewArea");
      if (!file) { area.innerHTML = ""; return; }
      const url = URL.createObjectURL(file);
      area.innerHTML = `<img src="${url}" class="preview-img" />`;
    }

    // ---------- 日志读写 ----------
    async function fetchLogs() {
      const { data, error } = await db
        .from("logs")
        .select("*")
        .order("date", { ascending: false })
        .order("created_at", { ascending: false });
      if (error) {
        document.getElementById("status").textContent = "❌ 连接失败：" + error.message;
        return [];
      }
      document.getElementById("status").textContent = "";
      return data || [];
    }

    async function uploadImage(file) {
      const ext = file.name.split(".").pop();
      const path = Date.now() + "_" + Math.random().toString(36).slice(2) + "." + ext;
      const { error } = await db.storage.from("images").upload(path, file);
      if (error) { throw error; }
      const { data } = db.storage.from("images").getPublicUrl(path);
      return data.publicUrl;
    }

    async function saveLog() {
      const title = document.getElementById("title").value.trim();
      const date = document.getElementById("date").value || new Date().toISOString().slice(0, 10);
      const tagsStr = document.getElementById("tags").value
        .split(",").map(t => t.trim()).filter(Boolean).join(",");
      const content = document.getElementById("content").value.trim();
      const editId = document.getElementById("editId").value;
      let imageUrl = document.getElementById("editImageUrl").value || null;

      if (!title) { alert("请填写标题"); return; }

      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;
      saveBtn.textContent = "保存中…";

      try {
        const file = document.getElementById("imageFile").files[0];
        if (file) {
          imageUrl = await uploadImage(file);
        }

        if (editId) {
          const { error } = await db.from("logs")
            .update({ title, date, tags: tagsStr, content, image_url: imageUrl })
            .eq("id", editId);
          if (error) throw error;
        } else {
          const { error } = await db.from("logs")
            .insert({ title, date, tags: tagsStr, content, image_url: imageUrl });
          if (error) throw error;
        }
        resetForm();
        await reload();
      } catch (e) {
        alert("保存失败：" + e.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "保存";
      }
    }

    function resetForm() {
      document.getElementById("editId").value = "";
      document.getElementById("editImageUrl").value = "";
      document.getElementById("title").value = "";
      document.getElementById("date").value = new Date().toISOString().slice(0, 10);
      document.getElementById("tags").value = "";
      document.getElementById("content").value = "";
      document.getElementById("imageFile").value = "";
      document.getElementById("previewArea").innerHTML = "";
      document.getElementById("formTitle").textContent = "新增日志";
    }

    function editLog(id) {
      const log = cache.find(l => String(l.id) === String(id));
      if (!log) return;
      document.getElementById("editId").value = log.id;
      document.getElementById("editImageUrl").value = log.image_url || "";
      document.getElementById("title").value = log.title || "";
      document.getElementById("date").value = log.date || "";
      document.getElementById("tags").value = log.tags || "";
      document.getElementById("content").value = log.content || "";
      document.getElementById("imageFile").value = "";
      document.getElementById("previewArea").innerHTML =
        log.image_url ? `<img src="${escapeHtml(log.image_url)}" class="preview-img" />` : "";
      document.getElementById("formTitle").textContent = "编辑日志";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteLog(id) {
      if (!confirm("确定删除这条日志吗？")) return;
      const { error } = await db.from("logs").delete().eq("id", id);
      if (error) { alert("删除失败：" + error.message); return; }
      await reload();
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : str;
      return div.innerHTML;
    }

    function tagsToArray(tagsStr) {
      return (tagsStr || "").split(",").map(t => t.trim()).filter(Boolean);
    }

    function updateTagFilter() {
      const select = document.getElementById("filterTag");
      const current = select.value;
      const allTags = [...new Set(cache.flatMap(l => tagsToArray(l.tags)))].sort();
      select.innerHTML = '<option value="">全部标签</option>' +
        allTags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
      select.value = current;
    }

    function render() {
      updateTagFilter();
      const keyword = document.getElementById("search").value.toLowerCase();
      const filterTag = document.getElementById("filterTag").value;
      const filtered = cache.filter(l =>
        ((l.title || "").toLowerCase().includes(keyword) ||
         (l.content || "").toLowerCase().includes(keyword)) &&
        (!filterTag || tagsToArray(l.tags).includes(filterTag))
      );
      const list = document.getElementById("list");
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无日志。</div>';
        return;
      }
      list.innerHTML = filtered.map(l => `
        <div class="card log-item">
          <h3>${escapeHtml(l.title)}</h3>
          <div class="meta">📅 ${escapeHtml(l.date)}</div>
          <div>${tagsToArray(l.tags).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
          <div class="content">${escapeHtml(l.content)}</div>
          ${l.image_url ? `<img src="${escapeHtml(l.image_url)}" class="log-img" />` : ``}
          ${isLoggedIn ? `
          <div class="actions">
            <button class="secondary" onclick="editLog('${l.id}')">编辑</button>
            <button class="danger" onclick="deleteLog('${l.id}')">删除</button>
          </div>` : ``}
        </div>
      `).join("");
    }

    async function reload() {
      cache = await fetchLogs();
      render();
    }

    (async function init() {
      resetForm();
      await checkAuth();
      await reload();
    })();
  </script>
</body>
</html>
